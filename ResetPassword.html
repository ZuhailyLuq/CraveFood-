        /* ── Notice ── */
        .notice {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;

            display: none;

        }
        .notice.show { display: block; }
        .notice-error { background: #fdf2f2; color: #c1121f; border: 1px solid #f8d7da; }

</head>
<body>
    <a href="Homepage.php" class="back-home-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Home
    </a>

    <div class="auth-container">
        <div id="notice" class="notice"></div>
        <div class="auth-box">
            
            <div class="auth-logo">
                <h1>🍽 CraveFood</h1>
                <p>Reset your password</p>
            </div>

            <form class="auth-form" id="resetForm" style="display: block;" action="AuthHandler.php" method="POST">
                <input type="hidden" name="auth_action" value="reset_password">

                <label for="resetRole">I am a</label>
                <select name="role" id="resetRole" class="role-select">
                    <option value="user">User</option>
                    <option value="vendor">Vendor</option>
                </select>

                <label for="resetEmail">Account Email</label>
                <input type="email" name="reset_email" id="resetEmail" placeholder="Enter your registered email" maxlength="255" required>

                <label for="resetPassword">New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="reset_password" id="resetPassword" placeholder="Create a new password" required minlength="6" maxlength="255">
                    <button type="button" class="btn-eye" aria-label="Toggle password visibility" onclick="togglePassword('resetPassword')">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                    </button>
                </div>

                <label for="resetPasswordConfirm">Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="reset_password_confirm" id="resetPasswordConfirm" placeholder="Re-enter your new password" required minlength="6" maxlength="255">
                    <button type="button" class="btn-eye" aria-label="Toggle password visibility" onclick="togglePassword('resetPasswordConfirm')">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                    </button>
                </div>

                <button type="submit" class="btn-primary">Update Password</button>
            </form>

            <div class="back-link">
                <a href="Login.html">&larr; Back to Login</a>
            </div>

        </div>
    </div>

    <script>
        function togglePassword(inputId) {
            var input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }

        // Show notice from URL params
        (function () {
            var params = new URLSearchParams(window.location.search);
            var msg = params.get('msg');
            if (!msg) return;
            var type = params.get('type') || 'error';
            var notice = document.getElementById('notice');
            notice.textContent = decodeURIComponent(msg);
            notice.classList.add('show');
            notice.classList.add(type === 'success' ? 'notice-success' : 'notice-error');
        })();
    </script>
</body>
