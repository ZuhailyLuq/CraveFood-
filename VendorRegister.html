<html>
<head>
    <link rel="stylesheet" href="style.css?v=20260621-4">
    <title>Vendor Register</title>
</head>
<body>
    <div id="notice" class="notice"></div>

    <div class="InfoBox">
        <div class="Head">
            <h1>Vendor Register</h1>
        </div>

        <form action="VendorInsertandVerify.php" method="POST">
            <input type="text" name="ShopName" placeholder="Shop Name" required maxlength="100">
            <input type="email" name="VendorEmail" placeholder="Email" required maxlength="255">
            <input type="password" name="VendorPassword" placeholder="Password" required minlength="6" maxlength="255">
            <button type="submit" name="Action_Insert" value="Submit">Register</button>
        </form>

        <p class="form-link">
            Already have a vendor account? <a href="VendorLogin.html">Login</a>
        </p>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var msg = params.get('msg');
            if (!msg) return;
            var type = params.get('type') || 'error';
            var notice = document.getElementById('notice');
            notice.textContent = decodeURIComponent(msg);
            notice.classList.add('show');
            notice.classList.add(type === 'success' ? 'notice-success' : 'notice-error');
        })();
    </script>
</body>
</html>
