<html>
<head>
    <link rel="stylesheet" href="style.css?v=20260622-1">
    <title>Vendor Login</title>

    <style>
        .back-home-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #666;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            z-index: 9999;
        }
        .back-home-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        .back-home-btn:hover {
            color: #c1121f;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(193,18,31,0.1);
        }
    </style>
</head>
<body>
    <a href="Homepage.php" class="back-home-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Home
    </a>

    <div id="notice" class="notice"></div>

    <div class="InfoBox">
        <div class="Head">
            <h1>Vendor Login</h1>
        </div>

        <form action="VendorInsertandVerify.php" method="POST">
            <input type="text" name="ShopName" placeholder="Shop Name" required maxlength="100">
            <input type="password" name="VendorPassword" placeholder="Password" required minlength="6" maxlength="255">
            <button type="submit" name="Action_Verify" value="Submit">Enter</button>
        </form>

        <p class="form-link">
            Don't have an account? <a href="VendorRegister.html">Register</a><br><br>
            Back to user login? <a href="Login.html">Login</a>
        </p>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var msg = params.get('msg');
            if (!msg) return;
            var type = params.get('type') || 'error';
            var notice = document.getElementById('notice');
            notice.textContent = decodeURIComponent(msg);
            notice.classList.add('show');
            notice.classList.add(type === 'success' ? 'notice-success' : 'notice-error');
        })();
    </script>
</body>
</html>
